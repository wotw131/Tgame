<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鸦岭 · Crow Ridge</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Sans SC','Microsoft YaHei',sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  /* Ambient background */
  .bg-ambient {
    position: fixed;
    top:0; left:0;
    width: 100%; height: 100%;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(30,0,0,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 30% 80%, rgba(0,0,0,0.8) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 20%, rgba(10,0,0,0.4) 0%, transparent 40%);
    z-index: 0;
  }

  /* Subtle particles */
  .particles {
    position: fixed;
    top:0; left:0;
    width: 100%; height: 100%;
    z-index: 1;
    pointer-events: none;
  }

  .particle {
    position: absolute;
    background: rgba(139,0,0,0.15);
    border-radius: 50%;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    10% { opacity: 0.6; }
    90% { opacity: 0; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  /* Login container */
  .login-container {
    position: relative;
    z-index: 10;
    text-align: center;
    animation: fadeIn 1.5s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Title */
  .game-title {
    font-family: 'ZCOOL XiaoWei','Noto Serif SC','楷体','KaiTi',serif;
    font-size: 4rem;
    color: #c8c8c8;
    letter-spacing: 0.3em;
    margin-bottom: 4px;
    text-shadow: 0 0 40px rgba(139,0,0,0.3), 0 2px 4px rgba(0,0,0,0.8);
    transition: text-shadow 0.5s ease;
  }

  .game-title:hover {
    text-shadow: 0 0 60px rgba(139,0,0,0.5), 0 2px 8px rgba(0,0,0,0.9);
  }

  .game-subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: #444;
    letter-spacing: 0.4em;
    margin-bottom: 40px;
  }

  /* Avatar */
  .avatar-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    margin: 0 auto 24px;
    background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
    border: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: all 0.5s ease;
  }

  .avatar-ring.focused {
    border-color: #555;
    box-shadow: 0 0 20px rgba(139,0,0,0.2);
  }

  .avatar-ring .avatar-icon {
    font-size: 2.5rem;
    opacity: 0.6;
  }

  .avatar-ring .status-dot {
    position: absolute;
    bottom: 6px;
    right: 6px;
    width: 10px;
    height: 10px;
    background: #333;
    border-radius: 50%;
    border: 2px solid #1a1a1a;
    transition: background 0.5s ease;
  }

  .avatar-ring .status-dot.online {
    background: #00cc00;
    box-shadow: 0 0 8px rgba(0,204,0,0.4);
  }

  /* Username */
  .username-display {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 20px;
    font-weight: 400;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  /* Password input */
  .password-wrapper {
    position: relative;
    width: 280px;
    margin: 0 auto;
  }

  .password-input {
    width: 100%;
    padding: 12px 44px 12px 16px;
    background: rgba(20,20,20,0.9);
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    color: #ccc;
    font-size: 0.95rem;
    letter-spacing: 0.3em;
    text-align: center;
    outline: none;
    transition: all 0.3s ease;
    font-family: 'Space Mono', monospace;
  }

  .password-input:focus {
    border-color: #555;
    box-shadow: 0 0 20px rgba(139,0,0,0.15);
    background: rgba(30,30,30,0.95);
  }

  .password-input::placeholder {
    color: #333;
    letter-spacing: 0.1em;
  }

  .password-input.error {
    border-color: var(--accent-red, #8b0000);
    animation: shake 0.5s ease;
  }

  @keyframes shake {
    0%,100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(6px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(4px); }
  }

  /* Submit arrow */
  .submit-arrow {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #444;
    font-size: 1.2rem;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 4px 8px;
  }

  .submit-arrow:hover {
    color: #888;
  }

  .submit-arrow:active {
    color: var(--accent-red, #8b0000);
  }

  /* Error message */
  .error-msg {
    color: var(--accent-red, #8b0000);
    font-size: 0.7rem;
    margin-top: 10px;
    min-height: 20px;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .error-msg.show {
    opacity: 1;
  }

  /* Hint */
  .login-hint {
    color: #222;
    font-size: 0.6rem;
    margin-top: 30px;
    letter-spacing: 0.05em;
    transition: color 0.3s;
  }

  .login-hint:hover {
    color: #444;
  }

  /* Loading */
  .loading-dots {
    display: none;
    margin-top: 16px;
  }

  .loading-dots.active {
    display: block;
  }

  .loading-dots span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #444;
    border-radius: 50%;
    margin: 0 4px;
    animation: dotPulse 1.4s ease infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotPulse {
    0%,80%,100% { opacity: 0.3; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1.2); }
  }

  /* Bottom text */
  .bottom-text {
    position: fixed;
    bottom: 30px;
    left: 0;
    width: 100%;
    text-align: center;
    color: #1a1a1a;
    font-size: 0.6rem;
    z-index: 10;
    letter-spacing: 0.1em;
  }

  /* Mobile */
  @media (max-width: 480px) {
    .game-title { font-size: 2.8rem; }
    .game-subtitle { font-size: 0.65rem; margin-bottom: 30px; }
    .password-wrapper { width: 240px; }
    .avatar-ring { width: 70px; height: 70px; }
    .avatar-ring .avatar-icon { font-size: 2rem; }
  }
</style>
</head>
<body>

<div class="bg-ambient"></div>

<!-- Particles -->
<div class="particles" id="particles"></div>

<!-- Login -->
<div class="login-container">
  <div class="game-title">鸦 岭</div>
  <div class="game-subtitle">C R O W  ·  R I D G E</div>

  <div class="avatar-ring" id="avatarRing">
    <span class="avatar-icon">👤</span>
    <span class="status-dot" id="statusDot"></span>
  </div>

  <div class="username-display">林 夏</div>

  <div class="password-wrapper">
    <input
      type="password"
      class="password-input"
      id="passwordInput"
      placeholder="输入密码"
      maxlength="24"
      autofocus
    >
    <button class="submit-arrow" id="submitBtn" title="登录">→</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="loading-dots" id="loadingDots">
    <span></span><span></span><span></span>
  </div>

  <div class="login-hint" id="loginHint">
    1999.12.31 — 2024.11.17
  </div>
</div>

<div class="bottom-text">加密连接 · 冷案数据库 · 安全节点</div>

<script>
  const passwordInput = document.getElementById('passwordInput');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const loadingDots = document.getElementById('loadingDots');
  const avatarRing = document.getElementById('avatarRing');
  const statusDot = document.getElementById('statusDot');
  const loginHint = document.getElementById('loginHint');

  // Create floating particles
  const particlesContainer = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const particle = document.createElement('div');
    particle.className = 'particle';
    const size = Math.random() * 3 + 1;
    particle.style.width = size + 'px';
    particle.style.height = size + 'px';
    particle.style.left = Math.random() * 100 + '%';
    particle.style.animationDuration = Math.random() * 15 + 10 + 's';
    particle.style.animationDelay = Math.random() * 10 + 's';
    particlesContainer.appendChild(particle);
  }

  // Focus effects
  passwordInput.addEventListener('focus', () => {
    avatarRing.classList.add('focused');
    statusDot.classList.add('online');
  });

  passwordInput.addEventListener('blur', () => {
    avatarRing.classList.remove('focused');
    statusDot.classList.remove('online');
  });

  // Attempt counter for immersive feedback
  let attempts = 0;
  const failMessages = [
    '密码错误',
    '请重试',
    '访问被拒绝',
    '记忆校验失败',
    '身份验证不通过',
  ];

  function handleLogin() {
    const password = passwordInput.value.trim();

    if (!password) {
      showError('请输入密码');
      shakeInput();
      return;
    }

    // Show loading
    loadingDots.classList.add('active');
    submitBtn.style.pointerEvents = 'none';
    errorMsg.classList.remove('show');

    // Simulate verification delay
    const delay = 800 + Math.random() * 1200;
    setTimeout(() => {
      loadingDots.classList.remove('active');
      submitBtn.style.pointerEvents = 'auto';

      // Attempt-based behavior for immersion
      attempts++;

      if (attempts <= 2) {
        // First two attempts fail for any password — builds tension
        showError(failMessages[attempts - 1]);
        shakeInput();
        passwordInput.value = '';
        passwordInput.focus();

        if (attempts === 2) {
          loginHint.style.color = '#555';
          loginHint.textContent = '提示：对你最重要的那个日子';
        }
      } else {
        // Third attempt: succeed regardless — it's about the journey
        loginSuccess();
      }
    }, delay);
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    setTimeout(() => errorMsg.classList.remove('show'), 2500);
  }

  function shakeInput() {
    passwordInput.classList.add('error');
    setTimeout(() => passwordInput.classList.remove('error'), 500);
  }

  function loginSuccess() {
    statusDot.classList.add('online');
    avatarRing.style.borderColor = '#555';
    avatarRing.style.boxShadow = '0 0 30px rgba(139,0,0,0.3)';

    errorMsg.textContent = '身份确认 · 正在进入系统...';
    errorMsg.style.color = '#00cc00';
    errorMsg.classList.add('show');

    passwordInput.disabled = true;
    submitBtn.style.display = 'none';

    // Dramatic pause then redirect
    setTimeout(() => {
      document.querySelector('.login-container').style.opacity = '0';
      document.querySelector('.login-container').style.transition = 'opacity 0.8s ease';
      document.querySelector('.bg-ambient').style.opacity = '0';
      document.querySelector('.bg-ambient').style.transition = 'opacity 0.8s ease';
    }, 1800);

    setTimeout(() => {
      window.location.href = 'desktop.html';
    }, 2800);
  }

  // Submit on Enter or button click
  passwordInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleLogin();
  });

  submitBtn.addEventListener('click', handleLogin);

  // Ambient: clicking anywhere focuses the input
  document.addEventListener('click', (e) => {
    if (e.target === document.body || e.target.classList.contains('bg-ambient')) {
      passwordInput.focus();
    }
  });

  // Restore hint on hover
  loginHint.addEventListener('mouseenter', () => {
    if (attempts < 2) {
      loginHint.style.color = '#444';
    }
  });
  loginHint.addEventListener('mouseleave', () => {
    if (attempts < 2) {
      loginHint.style.color = '#222';
    }
  });
</script>

</body>
</html>
